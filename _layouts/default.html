<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body class="{{ page.body_class }}">
    <header class="topbar">
      <a class="brand" href="{{ '/' | relative_url }}">weird wild west</a>
      <nav class="nav">
        <a href="{{ '/story/' | relative_url }}">story so far</a>
        <a href="{{ '/glossary/' | relative_url }}">glossary</a>
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="footer">
      <div class="footer-inner">
        <span>made by s/hohan</span>
      </div>
    </footer>
  </body>
</html>
